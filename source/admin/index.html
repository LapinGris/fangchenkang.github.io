<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Fangchen's Space 内容后台</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --line: #d9e0e7;
      --text: #1f2937;
      --muted: #667085;
      --brand: #2f4154;
      --accent: #2563eb;
      --danger: #b42318;
      --success: #047857;
      --shadow: 0 18px 50px rgba(31, 41, 55, 0.08);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      background: var(--brand);
      color: #fff;
      padding: 18px clamp(18px, 4vw, 42px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      box-shadow: 0 2px 18px rgba(47, 65, 84, 0.24);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 220px;
    }

    .brand strong {
      font-size: 20px;
      line-height: 1.2;
    }

    .brand span {
      color: rgba(255, 255, 255, 0.72);
      font-size: 13px;
    }

    .header-actions,
    .button-row,
    .tabs,
    .tools {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .header-actions {
      justify-content: flex-end;
    }

    .ghost-link,
    .icon-button,
    .primary-button,
    .plain-button,
    .danger-button {
      border: 1px solid transparent;
      border-radius: 8px;
      min-height: 38px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      white-space: nowrap;
    }

    .ghost-link {
      color: #fff;
      border-color: rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.08);
    }

    .icon-button {
      width: 38px;
      padding: 0;
      background: #fff;
      border-color: var(--line);
      color: var(--text);
      font-weight: 700;
    }

    .primary-button {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .plain-button {
      background: #fff;
      color: var(--text);
      border-color: var(--line);
    }

    .danger-button {
      background: #fff;
      color: var(--danger);
      border-color: #f3b8b2;
    }

    .type-button,
    .tab-button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      border-radius: 8px;
      min-height: 36px;
      padding: 0 12px;
    }

    .type-button.active,
    .tab-button.active {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }

    main {
      padding: 24px clamp(16px, 3vw, 36px) 36px;
      display: grid;
      grid-template-columns: minmax(270px, 360px) minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    aside,
    .workspace {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    aside {
      padding: 18px;
      display: grid;
      gap: 18px;
      position: sticky;
      top: 18px;
    }

    .workspace {
      min-width: 0;
      overflow: hidden;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 10px 11px;
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #8bb3ff;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.13);
    }

    textarea {
      resize: vertical;
      min-height: 520px;
      line-height: 1.72;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 14px;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .toolbar {
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .editor-meta {
      padding: 18px 18px 4px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .editor-area {
      display: grid;
    }

    .editor-panel,
    .preview-panel {
      padding: 18px;
    }

    .preview-panel {
      display: none;
      min-height: 540px;
      line-height: 1.85;
      background: #fff;
    }

    .preview-panel.active,
    .editor-panel.active {
      display: block;
    }

    .editor-panel.hidden {
      display: none;
    }

    .preview-panel h1,
    .preview-panel h2,
    .preview-panel h3 {
      color: #1d2939;
      line-height: 1.4;
    }

    .preview-panel img {
      max-width: 100%;
      border-radius: 8px;
    }

    .preview-panel blockquote {
      margin: 16px 0;
      padding: 2px 0 2px 16px;
      border-left: 4px solid var(--line);
      color: var(--muted);
    }

    .preview-panel code {
      background: #eef2f6;
      padding: 2px 5px;
      border-radius: 4px;
    }

    .preview-panel pre {
      background: #111827;
      color: #f9fafb;
      padding: 14px;
      border-radius: 8px;
      overflow: auto;
    }

    .content-list {
      display: grid;
      gap: 8px;
      max-height: 320px;
      overflow: auto;
    }

    .content-item {
      text-align: left;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 10px;
      color: var(--text);
    }

    .content-item small {
      display: block;
      color: var(--muted);
      margin-top: 4px;
      word-break: break-all;
    }

    .status {
      border-top: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      padding: 12px 16px;
      font-size: 13px;
      min-height: 44px;
    }

    .status.success {
      color: var(--success);
    }

    .status.error {
      color: var(--danger);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.36);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 20;
    }

    .modal.active {
      display: flex;
    }

    .modal-body {
      width: min(620px, 100%);
      background: #fff;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .modal-body h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1040px) {
      main {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
      }
    }

    @media (max-width: 700px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .header-actions {
        justify-content: flex-start;
      }

      .field-grid {
        grid-template-columns: 1fr;
      }

      textarea {
        min-height: 380px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand">
        <strong>Fangchen's Space 内容后台</strong>
        <span>写博客、管理研究项目和阅读笔记，发布到 GitHub 后自动更新网站</span>
      </div>
      <div class="header-actions">
        <a class="ghost-link" href="../" target="_blank" rel="noopener">打开博客</a>
        <button class="ghost-link" type="button" id="settingsButton">仓库设置</button>
      </div>
    </header>

    <main>
      <aside>
        <section>
          <p class="section-title">内容类型</p>
          <div class="tabs" id="typeTabs">
            <button class="type-button active" type="button" data-mode="post">博客文章</button>
            <button class="type-button" type="button" data-mode="project">研究项目</button>
            <button class="type-button" type="button" data-mode="reading">阅读笔记</button>
          </div>
        </section>

        <section>
          <p class="section-title">内容操作</p>
          <div class="button-row">
            <button class="plain-button" type="button" id="newButton">新建</button>
            <button class="plain-button" type="button" id="templateButton">套用模板</button>
            <button class="plain-button" type="button" id="loadListButton">读取列表</button>
          </div>
          <p class="muted" id="pathHint">发布到 source/_posts/文件名.md</p>
        </section>

        <section>
          <p class="section-title">图片上传</p>
          <div class="field">
            <label for="imageFile">选择图片</label>
            <input id="imageFile" type="file" accept="image/*">
          </div>
          <div class="button-row">
            <button class="plain-button" type="button" id="uploadImageButton">上传图片</button>
            <button class="plain-button" type="button" id="insertImageButton">插入正文</button>
          </div>
          <p class="muted" id="imageHint">博客图片会上传到 source/img/posts/</p>
        </section>

        <section>
          <p class="section-title">发布</p>
          <button class="primary-button" type="button" id="publishButton">保存并发布到 GitHub</button>
          <button class="plain-button" type="button" id="saveDraftButton">保存草稿</button>
          <button class="danger-button" type="button" id="clearDraftButton">清空草稿</button>
          <p class="muted">保存会创建一次 Git 提交。项目和阅读笔记会同步更新入口页卡片。</p>
        </section>

        <section>
          <p class="section-title">已有内容</p>
          <div class="content-list" id="contentList"></div>
        </section>
      </aside>

      <section class="workspace">
        <div class="toolbar">
          <div class="tabs">
            <button class="tab-button active" type="button" data-tab="editor">编辑</button>
            <button class="tab-button" type="button" data-tab="preview">预览</button>
          </div>
          <div class="tools">
            <button class="icon-button" type="button" data-wrap="**" title="加粗">B</button>
            <button class="icon-button" type="button" data-wrap="*" title="斜体">I</button>
            <button class="icon-button" type="button" data-prefix="## " title="标题">H</button>
            <button class="icon-button" type="button" data-prefix="> " title="引用">"</button>
            <button class="icon-button" type="button" data-prefix="- " title="列表">-</button>
          </div>
        </div>

        <div class="editor-meta">
          <div class="field-grid">
            <div class="field">
              <label for="title">标题</label>
              <input id="title" placeholder="例如：一份读书笔记">
            </div>
            <div class="field">
              <label for="slug">文件名 / 路径名</label>
              <input id="slug" placeholder="自动生成，可手动修改">
            </div>
          </div>

          <div class="field-grid">
            <div class="field">
              <label for="category" id="categoryLabel">分类</label>
              <input id="category" list="categoryOptions" value="随笔">
              <datalist id="categoryOptions"></datalist>
            </div>
            <div class="field" id="authorField">
              <label for="author">作者 / 文献信息</label>
              <input id="author" placeholder="阅读笔记可填写作者">
            </div>
          </div>

          <div class="field-grid">
            <div class="field">
              <label for="summary">简短说明</label>
              <input id="summary" placeholder="用于项目或阅读入口页卡片">
            </div>
            <div class="field">
              <label for="cover">封面 / 图片路径</label>
              <input id="cover" placeholder="/img/covers/default-book-cover.svg">
            </div>
          </div>

          <div class="field">
            <label for="tags">标签</label>
            <input id="tags" placeholder="用逗号分隔，例如：公共治理, 文本分析">
          </div>

          <label class="muted">
            <input id="syncCard" type="checkbox" checked>
            保存项目或阅读笔记时，同步更新入口页卡片
          </label>
        </div>

        <div class="editor-area">
          <div class="editor-panel active" id="editorPanel">
            <textarea id="content" placeholder="在这里写正文。博客支持 Markdown；项目和阅读页也可以直接编辑现有 HTML 模板。"></textarea>
          </div>
          <article class="preview-panel" id="previewPanel"></article>
        </div>
        <div class="status" id="status">准备就绪。</div>
      </section>
    </main>
  </div>

  <div class="modal" id="settingsModal" aria-hidden="true">
    <div class="modal-body">
      <h2>仓库设置</h2>
      <div class="field-grid">
        <div class="field">
          <label for="owner">Owner</label>
          <input id="owner" value="FangchenKang">
        </div>
        <div class="field">
          <label for="repo">Repository</label>
          <input id="repo" value="fangchenkang.github.io">
        </div>
      </div>
      <div class="field">
        <label for="branch">Branch</label>
        <input id="branch" value="main">
      </div>
      <div class="field">
        <label for="token">GitHub token</label>
        <input id="token" type="password" autocomplete="off" placeholder="Fine-grained token，Contents: Read and write">
        <div class="muted">token 只保存在当前浏览器的 localStorage 中。不要在公共电脑上保存。</div>
      </div>
      <div class="modal-actions">
        <button class="plain-button" type="button" id="closeSettingsButton">取消</button>
        <button class="primary-button" type="button" id="saveSettingsButton">保存设置</button>
      </div>
    </div>
  </div>

  <script>
    const storageKey = "fangchen_content_admin_settings";
    const draftKey = "fangchen_content_admin_draft";

    const modeConfig = {
      post: {
        label: "博客文章",
        listPath: "source/_posts",
        imageDir: "source/img/posts",
        imagePublic: "/img/posts",
        pathHint: "发布到 source/_posts/文件名.md",
        imageHint: "博客图片会上传到 source/img/posts/",
        categoryLabel: "分类",
        defaultCategory: "随笔",
        categories: ["随笔", "研究札记", "读书笔记", "生活记录"]
      },
      project: {
        label: "研究项目",
        listPath: "source/projects",
        imageDir: "source/img/projects",
        imagePublic: "/img/projects",
        pathHint: "发布到 source/projects/路径名/index.md",
        imageHint: "项目图片会上传到 source/img/projects/",
        categoryLabel: "项目类型",
        defaultCategory: "研究项目",
        defaultCover: "/img/projects/default-project.svg",
        indexPath: "source/projects/index.md",
        categories: ["研究项目", "方法学习", "数据与工具", "写作计划"]
      },
      reading: {
        label: "阅读笔记",
        listPath: "source/reading",
        imageDir: "source/img/covers",
        imagePublic: "/img/covers",
        pathHint: "发布到 source/reading/路径名/index.md",
        imageHint: "阅读封面会上传到 source/img/covers/",
        categoryLabel: "阅读类型",
        defaultCategory: "书籍",
        defaultCover: "/img/covers/default-book-cover.svg",
        indexPath: "source/reading/index.md",
        categories: ["书籍", "论文", "文献综述", "概念笔记"]
      }
    };

    const state = {
      mode: "post",
      editingPath: "",
      editingSha: "",
      lastImagePath: "",
      settings: {
        owner: "FangchenKang",
        repo: "fangchenkang.github.io",
        branch: "main",
        token: ""
      }
    };

    const $ = (id) => document.getElementById(id);
    const fields = {
      title: $("title"),
      slug: $("slug"),
      category: $("category"),
      author: $("author"),
      summary: $("summary"),
      cover: $("cover"),
      tags: $("tags"),
      content: $("content"),
      status: $("status"),
      syncCard: $("syncCard")
    };

    function setStatus(message, type) {
      fields.status.textContent = message;
      fields.status.className = "status" + (type ? " " + type : "");
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function escapeYaml(value) {
      return String(value || "").replace(/"/g, '\\"');
    }

    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function slugify(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .normalize("NFKD")
        .replace(/[^\w\u4e00-\u9fa5]+/g, "-")
        .replace(/^-+|-+$/g, "")
        || "untitled";
    }

    function safeFileName(name) {
      const dot = name.lastIndexOf(".");
      const base = dot >= 0 ? name.slice(0, dot) : name;
      const ext = dot >= 0 ? name.slice(dot).toLowerCase().replace(/[^.\w]/g, "") : "";
      const stamp = new Date().toISOString().slice(0, 10).replace(/-/g, "");
      return `${stamp}-${slugify(base)}${ext || ".png"}`;
    }

    function splitList(value) {
      return String(value || "")
        .split(/[,，]/)
        .map((item) => item.trim())
        .filter(Boolean);
    }

    function nowString() {
      const d = new Date();
      const pad = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function encodeBase64Utf8(value) {
      const bytes = new TextEncoder().encode(value);
      let binary = "";
      const chunk = 0x8000;
      for (let i = 0; i < bytes.length; i += chunk) {
        binary += String.fromCharCode(...bytes.subarray(i, i + chunk));
      }
      return btoa(binary);
    }

    function decodeBase64Utf8(value) {
      const binary = atob(value.replace(/\n/g, ""));
      const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    }

    function apiUrl(path) {
      const { owner, repo } = state.settings;
      return `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/${path}`;
    }

    async function githubFetch(path, options = {}) {
      if (!state.settings.token) {
        openSettings();
        throw new Error("请先填写 GitHub token。");
      }

      const response = await fetch(apiUrl(path), {
        ...options,
        headers: {
          "Accept": "application/vnd.github+json",
          "Authorization": `Bearer ${state.settings.token}`,
          "X-GitHub-Api-Version": "2022-11-28",
          ...(options.headers || {})
        }
      });
      const text = await response.text();
      const data = text ? JSON.parse(text) : null;
      if (!response.ok) {
        throw new Error(data && data.message ? data.message : `GitHub API ${response.status}`);
      }
      return data;
    }

    async function getFile(path) {
      return githubFetch(`contents/${path}?ref=${encodeURIComponent(state.settings.branch)}`);
    }

    async function getFileMaybe(path) {
      try {
        return await getFile(path);
      } catch (error) {
        if (/not found/i.test(error.message)) return null;
        throw error;
      }
    }

    async function putFile(path, content, message, sha) {
      const body = {
        message,
        content: encodeBase64Utf8(content),
        branch: state.settings.branch
      };
      if (sha) body.sha = sha;
      return githubFetch(`contents/${path}`, {
        method: "PUT",
        body: JSON.stringify(body)
      });
    }

    function loadSettings() {
      const saved = JSON.parse(localStorage.getItem(storageKey) || "{}");
      state.settings = Object.assign(state.settings, saved);
      $("owner").value = state.settings.owner;
      $("repo").value = state.settings.repo;
      $("branch").value = state.settings.branch;
      $("token").value = state.settings.token;
    }

    function saveSettings() {
      state.settings = {
        owner: $("owner").value.trim(),
        repo: $("repo").value.trim(),
        branch: $("branch").value.trim() || "main",
        token: $("token").value.trim()
      };
      localStorage.setItem(storageKey, JSON.stringify(state.settings));
      closeSettings();
      setStatus("仓库设置已保存。", "success");
    }

    function openSettings() {
      $("settingsModal").classList.add("active");
      $("settingsModal").setAttribute("aria-hidden", "false");
    }

    function closeSettings() {
      $("settingsModal").classList.remove("active");
      $("settingsModal").setAttribute("aria-hidden", "true");
    }

    function setMode(mode) {
      state.mode = mode;
      const config = modeConfig[mode];
      document.querySelectorAll("[data-mode]").forEach((button) => {
        button.classList.toggle("active", button.dataset.mode === mode);
      });
      $("pathHint").textContent = config.pathHint;
      $("imageHint").textContent = config.imageHint;
      $("categoryLabel").textContent = config.categoryLabel;

    function applyTemplate() {
      if (state.mode === "project") fields.content.value = projectTemplate();
      if (state.mode === "reading") fields.content.value = readingTemplate();
      if (state.mode === "post" && !fields.content.value) {
        fields.content.value = "这里开始写正文。";
      }
      updatePreview();
      saveDraft();
    }

    function parseFrontMatter(markdown) {
      const match = markdown.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
      if (!match) return { meta: {}, body: markdown };
      const metaText = match[1];
      const body = match[2];
      const meta = {};

      const readLine = (key) => {
        const found = metaText.match(new RegExp(`^${key}:\\s*"?(.+?)"?$`, "m"));
        return found ? found[1].replace(/\\"/g, '"') : "";
      };

      meta.title = readLine("title");
      meta.summary = readLine("summary");
      meta.cover = readLine("cover");
      meta.author = readLine("author");
      meta.project_type = readLine("project_type");
      meta.reading_type = readLine("reading_type");
      meta.category = readLine("category");

      const category = metaText.match(/categories:\n\s*-\s*(.+)/);
      if (category) meta.category = category[1].replace(/^"|"$/g, "");

      const tags = metaText.match(/tags:\n([\s\S]*?)(?:\n[a-zA-Z_]+:|$)/);
      if (tags) {
        meta.tags = tags[1]
          .split("\n")
          .map((line) => line.replace(/^\s*-\s*/, "").trim())
          .filter(Boolean)
          .join(", ");
      }

      return { meta, body };
    }

    function composeContent() {
      const tags = splitList(fields.tags.value);
      const title = fields.title.value.trim() || "未命名";

      if (state.mode === "post") {
        const tagLines = tags.length ? tags.map((tag) => `  - ${escapeYaml(tag)}`).join("\n") : "  - 写作";
        const lines = [
          "---",
          `title: "${escapeYaml(title)}"`,
          `date: ${nowString()}`,
          "categories:",
          `  - ${escapeYaml(fields.category.value.trim() || "随笔")}`,
          "tags:",
          tagLines
        ];
        if (fields.cover.value.trim()) lines.push(`index_img: ${fields.cover.value.trim()}`);
        lines.push("---", "");
        return lines.join("\n") + fields.content.value.trim() + "\n";
      }

      const metaKey = state.mode === "project" ? "project_type" : "reading_type";
      const tagLines = tags.length ? tags.map((tag) => `  - ${escapeYaml(tag)}`).join("\n") : "";
      const lines = [
        "---",
        `title: ${title}`,
        "layout: page",
        `${metaKey}: ${fields.category.value.trim() || modeConfig[state.mode].defaultCategory}`
      ];
      if (state.mode === "reading" && fields.author.value.trim()) lines.push(`author: ${fields.author.value.trim()}`);
      if (fields.summary.value.trim()) lines.push(`summary: "${escapeYaml(fields.summary.value.trim())}"`);
      if (fields.cover.value.trim()) lines.push(`cover: ${fields.cover.value.trim()}`);
      if (tagLines) lines.push("tags:", tagLines);
      lines.push("---", "");
      return lines.join("\n") + fields.content.value.trim() + "\n";
    }

    function currentPath() {
      const title = fields.title.value.trim();
      const slug = slugify(fields.slug.value || title);
      fields.slug.value = slug;
      if (state.mode === "post") return `source/_posts/${slug}.md`;
      return `source/${state.mode === "project" ? "projects" : "reading"}/${slug}/index.md`;
    }

    async function loadList() {
      try {
        const config = modeConfig[state.mode];
        setStatus(`正在读取${config.label}列表...`);
        const data = await githubFetch(`contents/${config.listPath}?ref=${encodeURIComponent(state.settings.branch)}`);
        const files = [];

        if (state.mode === "post") {
          data.filter((item) => item.type === "file" && item.name.endsWith(".md")).forEach((item) => files.push(item));
        } else {
          data.filter((item) => item.type === "dir").forEach((item) => {
            files.push({ name: item.name, path: `${item.path}/index.md` });
          });
        }

        const list = $("contentList");
        list.innerHTML = "";
        if (!files.length) list.innerHTML = '<div class="muted">还没有内容。</div>';
        files.sort((a, b) => a.name.localeCompare(b.name)).forEach((file) => {
          const button = document.createElement("button");
          button.className = "content-item";
          button.type = "button";
          button.innerHTML = `<span>${escapeHtml(file.name)}</span><small>${escapeHtml(file.path)}</small>`;
          button.addEventListener("click", () => loadItem(file.path));
          list.appendChild(button);
        });
        setStatus(`已读取 ${files.length} 条${config.label}。`, "success");
      } catch (error) {
        setStatus(error.message, "error");
      }
    }

    async function loadItem(path) {
      try {
        setStatus("正在打开内容...");
        const data = await getFile(path);
        const markdown = decodeBase64Utf8(data.content);
        const parsed = parseFrontMatter(markdown);
        const name = path.split("/").slice(-1)[0];
        const folder = path.split("/").slice(-2)[0];

        fields.title.value = parsed.meta.title || (state.mode === "post" ? name.replace(/\.md$/, "") : folder);
        fields.slug.value = state.mode === "post" ? name.replace(/\.md$/, "") : folder;
        fields.category.value =
          parsed.meta.project_type ||
          parsed.meta.reading_type ||
          parsed.meta.category ||
          modeConfig[state.mode].defaultCategory;
        fields.author.value = parsed.meta.author || "";
        fields.summary.value = parsed.meta.summary || "";
        fields.cover.value = parsed.meta.cover || (modeConfig[state.mode].defaultCover || "");
        fields.tags.value = parsed.meta.tags || "";
        fields.content.value = parsed.body.trim();
        state.editingPath = path;
        state.editingSha = data.sha;
        updatePreview();
        saveDraft();
        setStatus(`正在编辑 ${path}`, "success");
      } catch (error) {
        setStatus(error.message, "error");
      }
    }

    async function syncIndexCard(slug) {
      if (state.mode === "post") return;
      const config = modeConfig[state.mode];
      const start = state.mode === "project" ? "<!-- PROJECT_CARDS_START -->" : "<!-- READING_CARDS_START -->";
      const end = state.mode === "project" ? "<!-- PROJECT_CARDS_END -->" : "<!-- READING_CARDS_END -->";
      const card = state.mode === "project" ? buildProjectCard(slug) : buildReadingCard(slug);
      const file = await getFile(config.indexPath);
      let markdown = decodeBase64Utf8(file.content);
      const startIndex = markdown.indexOf(start);
      const endIndex = markdown.indexOf(end);
      if (startIndex < 0 || endIndex < 0 || endIndex < startIndex) {
        throw new Error(`没有在 ${config.indexPath} 找到入口页卡片标记。`);
      }

      const before = markdown.slice(0, startIndex + start.length);
      const segment = markdown.slice(startIndex + start.length, endIndex);
      const after = markdown.slice(endIndex);
      const className = state.mode === "project" ? "project-card" : "reading-card";
      const pattern = new RegExp(`\\n?<article class="library-card ${className}"[^>]*data-slug="${escapeRegExp(slug)}"[\\s\\S]*?<\\/article>\\n?`);
      const nextSegment = pattern.test(segment)
        ? segment.replace(pattern, `\n${card}\n`)
        : `${segment.trimEnd()}\n${card}\n`;
      markdown = `${before}${nextSegment}${after}`;
      await putFile(config.indexPath, markdown, `update ${state.mode} index: ${fields.title.value.trim()}`, file.sha);
    }

    async function publish() {
      try {
        const title = fields.title.value.trim();
        if (!title) throw new Error("请先填写标题。");
        const path = currentPath();
        if (state.editingPath && state.editingPath !== path) {
          throw new Error("正在编辑已有内容时暂不支持改文件名。请保持原文件名，或点击“新建”后另存为新条目。");
        }

        setStatus("正在保存到 GitHub...");
        const existing = state.editingSha ? { sha: state.editingSha } : await getFileMaybe(path);
        const content = composeContent();
        const action = existing ? "update" : "add";
        const result = await putFile(path, content, `${action} ${modeConfig[state.mode].label}: ${title}`, existing && existing.sha);
        state.editingPath = path;
        state.editingSha = result.content.sha;

        if (state.mode !== "post" && fields.syncCard.checked) {
          setStatus("内容已保存，正在同步入口页卡片...");
          await syncIndexCard(fields.slug.value);
        }

        saveDraft();
        setStatus("保存成功。GitHub Actions 会在稍后自动更新网站。", "success");
      } catch (error) {
        setStatus(error.message, "error");
      }
    }

    function readFileBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result).split(",")[1]);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    async function uploadImage() {
      try {
        const file = $("imageFile").files[0];
        if (!file) throw new Error("请先选择图片。");
        const config = modeConfig[state.mode];
        const name = safeFileName(file.name);
        const path = `${config.imageDir}/${name}`;
        const publicPath = `${config.imagePublic}/${name}`;
        const content = await readFileBase64(file);
        const existing = await getFileMaybe(path);

        setStatus("正在上传图片...");
        await githubFetch(`contents/${path}`, {
          method: "PUT",
          body: JSON.stringify({
            message: `upload image: ${name}`,
            content,
            branch: state.settings.branch,
            ...(existing ? { sha: existing.sha } : {})
          })
        });

        state.lastImagePath = publicPath;
        fields.cover.value = publicPath;
        saveDraft();
        setStatus(`图片已上传：${publicPath}`, "success");
      } catch (error) {
        setStatus(error.message, "error");
      }
    }

    function insertImage() {
      const path = state.lastImagePath || fields.cover.value.trim();
      if (!path) {
        setStatus("请先上传图片，或填写图片路径。", "error");
        return;
      }
      const alt = fields.title.value.trim() || "图片";
      const snippet = state.mode === "post"
        ? `\n![${alt}](${path})\n`
        : `\n<p><img src="${path}" alt="${escapeHtml(alt)}"></p>\n`;
      insertAtCursor(snippet);
    }

    function insertAtCursor(text) {
      const textarea = fields.content;
      const start = textarea.selectionStart;
      const end = textarea.selectionEnd;
      textarea.value = textarea.value.slice(0, start) + text + textarea.value.slice(end);
      textarea.focus();
      textarea.selectionStart = textarea.selectionEnd = start + text.length;
      updatePreview();
      saveDraft();
    }

    function renderMarkdown(markdown) {
      const escaped = markdown
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
      const lines = escaped.split("\n");
      let html = "";
      let inList = false;
      let inCode = false;
      let code = [];

      const flushCode = () => {
        if (inCode) {
          html += `<pre><code>${code.join("\n")}</code></pre>`;
          inCode = false;
          code = [];
        }
      };

      lines.forEach((line) => {
        if (line.startsWith("```")) {
          if (inCode) flushCode();
          else inCode = true;
          return;
        }
        if (inCode) {
          code.push(line);
          return;
        }
        if (/^\s*$/.test(line)) {
          if (inList) {
            html += "</ul>";
            inList = false;
          }
          return;
        }
        const inline = line
          .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
          .replace(/\*(.+?)\*/g, "<em>$1</em>")
          .replace(/`(.+?)`/g, "<code>$1</code>")
          .replace(/!\[(.*?)\]\((.+?)\)/g, '<img src="$2" alt="$1">')
          .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

        if (line.startsWith("### ")) html += `<h3>${inline.slice(4)}</h3>`;
        else if (line.startsWith("## ")) html += `<h2>${inline.slice(3)}</h2>`;
        else if (line.startsWith("# ")) html += `<h1>${inline.slice(2)}</h1>`;
        else if (line.startsWith("> ")) html += `<blockquote>${inline.slice(2)}</blockquote>`;
        else if (line.startsWith("- ")) {
          if (!inList) {
            html += "<ul>";
            inList = true;
          }
          html += `<li>${inline.slice(2)}</li>`;
        } else {
          if (inList) {
            html += "</ul>";
            inList = false;
          }
          html += `<p>${inline}</p>`;
        }
      });

      if (inList) html += "</ul>";
      flushCode();
      return html || "<p>预览会显示在这里。</p>";
    }

    function updatePreview() {
      if (state.mode === "post") {
        $("previewPanel").innerHTML = renderMarkdown(fields.content.value);
      } else {
        $("previewPanel").innerHTML = fields.content.value || "<p>预览会显示在这里。</p>";
      }
    }

    function wrapSelection(before, after = before) {
      const textarea = fields.content;
      const start = textarea.selectionStart;
      const end = textarea.selectionEnd;
      const selected = textarea.value.slice(start, end) || "文本";
      textarea.value = textarea.value.slice(0, start) + before + selected + after + textarea.value.slice(end);
      textarea.focus();
      textarea.selectionStart = start + before.length;
      textarea.selectionEnd = start + before.length + selected.length;
      updatePreview();
      saveDraft();
    }

    function prefixSelection(prefix) {
      const textarea = fields.content;
      const start = textarea.selectionStart;
      const end = textarea.selectionEnd;
      const selected = textarea.value.slice(start, end) || "文本";
      const replacement = selected.split("\n").map((line) => prefix + line).join("\n");
      textarea.value = textarea.value.slice(0, start) + replacement + textarea.value.slice(end);
      textarea.focus();
      updatePreview();
      saveDraft();
    }

    $("settingsButton").addEventListener("click", openSettings);
    $("closeSettingsButton").addEventListener("click", closeSettings);
    $("saveSettingsButton").addEventListener("click", saveSettings);
    $("newButton").addEventListener("click", newContent);
    $("templateButton").addEventListener("click", applyTemplate);
    $("loadListButton").addEventListener("click", loadList);
    $("saveDraftButton").addEventListener("click", saveDraft);
    $("clearDraftButton").addEventListener("click", clearDraft);
    $("publishButton").addEventListener("click", publish);
    $("uploadImageButton").addEventListener("click", uploadImage);
    $("insertImageButton").addEventListener("click", insertImage);

    document.querySelectorAll("[data-mode]").forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.mode));
    });

    fields.title.addEventListener("input", () => {
      if (!fields.slug.value || !state.editingPath) fields.slug.value = slugify(fields.title.value);
      if (state.mode !== "post" && !fields.content.value.trim()) applyTemplate();
      saveDraft();
    });

    ["slug", "category", "author", "summary", "cover", "tags", "content"].forEach((id) => {
      fields[id].addEventListener("input", () => {
        updatePreview();
        saveDraft();
      });
    });

    document.querySelectorAll("[data-tab]").forEach((button) => {
      button.addEventListener("click", () => {
        const tab = button.dataset.tab;
        document.querySelectorAll("[data-tab]").forEach((item) => item.classList.toggle("active", item === button));
        $("editorPanel").classList.toggle("hidden", tab !== "editor");
        $("previewPanel").classList.toggle("active", tab === "preview");
        updatePreview();
      });
    });

    document.querySelectorAll("[data-wrap]").forEach((button) => {
      button.addEventListener("click", () => wrapSelection(button.dataset.wrap));
    });

    document.querySelectorAll("[data-prefix]").forEach((button) => {
      button.addEventListener("click", () => prefixSelection(button.dataset.prefix));
    });

    loadSettings();
    setMode("post");
    loadDraft();
    updatePreview();
  </script>
</body>
</html>
